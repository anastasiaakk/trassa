# Сборка установщика Windows и GitHub Release для автообновления.
#
# Автоматически при пуше в main: если для версии из package.json ещё НЕТ релиза —
# собирается установщик trassa-setup.exe и создаётся Release (тег v* создаётся сам через gh).
#
# Вручную: тег v* по-прежнему запускает сборку; workflow_dispatch — только артефакт, без Release.
#
# Что делать вам: поднимите "version" в package.json → commit → push в main.

name: Release Windows

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 150
    env:
      TRASSA_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/latest/download/app-update.json
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      WIN_CSC_LINK: ""
      WIN_CSC_KEY_PASSWORD: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Нужна ли сборка (релиз для этой версии уже есть?)
        id: gate
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "run=true" >> $env:GITHUB_OUTPUT
            Write-Host "Ручной запуск — всегда собираем (артефакт без Release)."
            exit 0
          }
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $v = $pkg.version
          $tag = "v$v"
          echo "version_tag=$tag" >> $env:GITHUB_OUTPUT
          gh release view $tag *> $null
          $hasRelease = $LASTEXITCODE -eq 0
          if ($hasRelease) {
            echo "run=false" >> $env:GITHUB_OUTPUT
            Write-Host "::notice::Релиз $tag уже есть — пропуск (поднимите version в package.json для нового выпуска)."
          } else {
            echo "run=true" >> $env:GITHUB_OUTPUT
            Write-Host "Релиза $tag ещё нет — будет сборка и публикация."
          }
          exit 0

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            setup-wizard/package-lock.json

      - name: Install dependencies (root)
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Install dependencies (server)
        if: steps.gate.outputs.run == 'true'
        run: npm ci --prefix server

      - name: Install dependencies (setup-wizard)
        if: steps.gate.outputs.run == 'true'
        run: npm ci --prefix setup-wizard

      - name: "Build: assets + icons + release-config"
        if: steps.gate.outputs.run == 'true'
        run: node scripts/sync-tagjs-assets.cjs && node scripts/ensure-public-assets.cjs && node scripts/generate-icon-ico.cjs && node scripts/apply-release-config.cjs

      - name: "Build: web (tsc + vite)"
        if: steps.gate.outputs.run == 'true'
        run: npm run build

      - name: "Build: server (bundle + prod deps)"
        if: steps.gate.outputs.run == 'true'
        run: npm run server:restoredeps && npm run build --prefix server && npm run server:proddeps && node scripts/sanitize-server-node-modules.cjs

      - name: "Build: Electron app (dir) + embed icon"
        if: steps.gate.outputs.run == 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: node scripts/clean-release-win-unpacked.cjs && npx electron-builder --win dir --publish never

      - name: "Build: neo setup installer"
        if: steps.gate.outputs.run == 'true'
        env:
          CI: true
          NODE_OPTIONS: --max-old-space-size=8192
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          WIN_CSC_LINK: ""
          WIN_CSC_KEY_PASSWORD: ""
        run: node scripts/embed-win-icon.cjs && node scripts/build-neo-setup.cjs

      - name: "Build: restore server deps"
        if: steps.gate.outputs.run == 'true'
        run: npm run server:restoredeps

      - name: Prepare release files
        if: steps.gate.outputs.run == 'true'
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $v = $pkg.version
          $src = Join-Path "release" "trassa-setup-$v.exe"
          if (-not (Test-Path -LiteralPath $src)) {
            throw "Не найден установщик: $src (ожидается после build-neo-setup.cjs)."
          }
          Copy-Item -LiteralPath $src -Destination "trassa-setup.exe" -Force
          $repo = "${{ github.repository }}"
          $setupUrl = "https://github.com/$repo/releases/latest/download/trassa-setup.exe"
          $obj = [ordered]@{
            version      = $v
            setupUrl     = $setupUrl
            releaseNotes = "Версия $v"
          }
          $json = ($obj | ConvertTo-Json -Compress)
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText("$PWD/app-update.json", $json, $utf8)
          Write-Host "Prepared trassa-setup.exe and app-update.json for version $v"

      - name: Upload build artifact (ручной запуск)
        if: github.event_name == 'workflow_dispatch' && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: trassa-windows-release
          path: |
            trassa-setup.exe
            app-update.json

      - name: Create GitHub Release
        if: steps.gate.outputs.run == 'true' && github.event_name != 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $tag = "v$($pkg.version)"
          gh release view $tag *> $null
          $hasRelease = $LASTEXITCODE -eq 0
          if ($hasRelease) {
            Write-Host "::notice::Релиз $tag уже существует — только загружаем файлы."
            gh release upload $tag "trassa-setup.exe" "app-update.json" --clobber
            exit $LASTEXITCODE
          }
          gh release create $tag --title "Трасса $tag" --target "${{ github.sha }}" --generate-notes "trassa-setup.exe" "app-update.json"
          exit $LASTEXITCODE
