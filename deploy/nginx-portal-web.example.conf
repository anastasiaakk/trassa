# Портал в браузере + API на одном домене (QR, телефоны, любой интернет).
# DuckDNS: создайте второй поддомен на тот же IP, например trassa.duckdns.org
# API уже может быть на trassa-api.duckdns.org — этот файл для ОТДЕЛЬНОГО имени сайта.
#
# Скопируйте: sudo cp deploy/nginx-portal-web.example.conf /etc/nginx/sites-available/trassa-portal
# sudo ln -sf /etc/nginx/sites-available/trassa-portal /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# sudo certbot --nginx -d trassa.duckdns.org

server {
    listen 80;
    listen [::]:80;
    server_name trassa.duckdns.org;

    root /var/www/trassa/dist;
    index index.html;

    client_max_body_size 20m;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|webp|ico)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    location ~* \.(mp4|mov|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # index.html — без долгого кэша (иначе телефон держит старый бандл)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
        try_files $uri =404;
    }

    # React HashRouter — любой путь отдаёт index.html
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # SSE: синхронизация вкладки портала
    location /api/portal/live {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding off;
    }

    # legacy SSE (совместимость)
    location /api/devices/events {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding off;
    }

    # Тот же Node API, что и для десктопа (порт 4000)
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
        client_body_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }
}
